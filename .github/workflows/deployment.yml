name: Continuous Deployment

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-southeast-2

permissions:
  contents: read
  id-token: write

jobs:
  build_deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.ROLE }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Install and build
      run: |
        npm install -g pnpm@latest-11
        pnpm i --frozen-lockfile
        pnpm build-only

    - name: Upload to S3
      run: |
        aws s3 cp ./dist/index.html s3://${{ secrets.BUCKET_NAME }}/index.html --cache-control "no-cache"
        aws s3 cp ./dist/favicon.ico s3://${{ secrets.BUCKET_NAME }}/favicon.ico --cache-control "public,max-age=86400,immutable"
        aws s3 cp ./dist/assets/ s3://${{ secrets.BUCKET_NAME }}/assets/ --recursive --cache-control "public,max-age=31536000,immutable"

    - name: Invalidate CloudFront
      run: |
        aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"
